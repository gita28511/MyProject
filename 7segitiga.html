    }

    header h1 {

      font-weight: 700;
      color: #e94560;
      margin-bottom: 8px;

    }

    header p {

      color: #a0a0c0;
    }

      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .score-card {

      border-radius: 12px;
      padding: 16px 28px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      min-width: 120px;
    }

    .score-card .label {
      font-size: 0.8rem;
      color: #a0a0c0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-card .value {
      font-size: 2rem;
      font-weight: 700;
      margin-top: 4px;
    }

    .score-card.total .value { color: #e0e0e0; }
    .score-card.correct .value { color: #4ade80; }
    .score-card.wrong .value { color: #f87171; }

    .question-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 24px;

      backdrop-filter: blur(6px);
    }

    .question-card:hover {

    }

    .question-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

      color: white;

      padding: 4px 12px;

      line-height: 1.7;
      color: #e0e0e0;
      margin-bottom: 20px;
    }

      flex-direction: column;
      gap: 10px;
      margin-bottom: 18px;
    }

    .option-btn {

      align-items: center;
      gap: 12px;
      padding: 13px 18px;
      border-radius: 10px;
      border: 2px solid rgba(255, 255, 255, 0.1);

      color: #d0d0e0;
      font-size: 0.95rem;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
    }

    .option-btn:hover:not(:disabled) {
      border-color: #7b8cde;
      background: rgba(123, 140, 222, 0.1);
      color: #ffffff;
    }

    .option-btn:disabled {
      cursor: default;
    }

    .option-btn .opt-label {
      font-weight: 700;
      font-size: 0.9rem;
      min-width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
    }

    .option-btn.correct {
      border-color: #4ade80;
      background: rgba(74, 222, 128, 0.12);
      color: #4ade80;
    }

    .option-btn.correct .opt-label {
      background: #4ade80;
      color: #0a1628;

    .option-btn.wrong {
      border-color: #f87171;
      background: rgba(248, 113, 113, 0.12);

    }

      background: #f87171;
      color: #0a1628;
    }

      background: rgba(74, 222, 128, 0.07);
      color: #4ade80;
    }

      background: rgba(74, 222, 128, 0.3);
      color: #4ade80;
    }

      font-size: 0.9rem;
      margin-bottom: 14px;
      line-height: 1.6;
    }

      padding: 4px 14px;
      border-radius: 8px;
      font-weight: 700;
      margin-top: 6px;
    }

      border: 1px solid rgba(123, 140, 222, 0.4);
      color: #7b8cde;
      padding: 8px 16px;
      border-radius: 8px;

      color: #a0b0ff;

      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;

</head>

let correctCount = 0;
let wrongCount = 0;
let answered = 0;

function buildQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';

  soalData.forEach((soal, index) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${index}`;

    const opsiHTML = soal.opsi.map((opt, i) => {
      const label = ['A', 'B', 'C', 'D'][i];
      return `
        <button class="option-btn" onclick="pilihJawaban(${index}, ${i})" id="opt-${index}-${i}">
          <span class="opt-label">${label}</span>
          <span>${opt}</span>
        </button>`;
    }).join('');

    const penyelesaianHTML = soal.penyelesaian.map(step => `<li>${step}</li>`).join('');

    card.innerHTML = `
      <div class="question-header">
        <span class="question-number">Soal ${index + 1}</span>
        <span class="question-category">${soal.kategori}</span>
      </div>
      <p class="question-text">${soal.pertanyaan}</p>
      <div class="options" id="opts-${index}">
        ${opsiHTML}
      </div>
      <div class="feedback" id="fb-${index}"></div>
      <button class="show-solution-btn" id="solbtn-${index}" style="display:none;" onclick="togglePenyelesaian(${index})">
        📖 Tampilkan Penyelesaian
      </button>
      <div class="penyelesaian" id="sol-${index}">
        <h4>Langkah Penyelesaian</h4>
        <ol>${penyelesaianHTML}</ol>
      </div>
    `;

    container.appendChild(card);
  });
}

function pilihJawaban(soalIndex, opsiIndex) {
  const soal = soalData[soalIndex];
  const allButtons = document.querySelectorAll(`#opts-${soalIndex} .option-btn`);
  const fb = document.getElementById(`fb-${soalIndex}`);
  const solBtn = document.getElementById(`solbtn-${soalIndex}`);

  allButtons.forEach(btn => btn.disabled = true);

  const selectedBtn = document.getElementById(`opt-${soalIndex}-${opsiIndex}`);
  const correctBtn = document.getElementById(`opt-${soalIndex}-${soal.jawaban}`);

  if (opsiIndex === soal.jawaban) {
    selectedBtn.classList.add('correct');
    fb.className = 'feedback show correct-fb';
    fb.innerHTML = '✅ <strong>Benar!</strong> Jawaban kamu tepat.';
    correctCount++;
    document.getElementById('correctCount').textContent = correctCount;
  } else {
    selectedBtn.classList.add('wrong');
    correctBtn.classList.add('reveal-correct');
    fb.className = 'feedback show wrong-fb';
    fb.innerHTML = `❌ <strong>Salah.</strong> Jawaban yang benar adalah <strong>${['A','B','C','D'][soal.jawaban]}. ${soal.opsi[soal.jawaban]}</strong>.`;
    wrongCount++;
    document.getElementById('wrongCount').textContent = wrongCount;
  }

  solBtn.style.display = 'inline-block';
  answered++;

  if (answered === soalData.length) {
    setTimeout(showResult, 500);
  }
}

function togglePenyelesaian(index) {
  const sol = document.getElementById(`sol-${index}`);
  const btn = document.getElementById(`solbtn-${index}`);
  if (sol.classList.contains('show')) {
    sol.classList.remove('show');
    btn.textContent = '📖 Tampilkan Penyelesaian';
  } else {
    sol.classList.add('show');
    btn.textContent = '🔼 Sembunyikan Penyelesaian';
  }
}

function showResult() {
  const summary = document.getElementById('resultSummary');
  const scoreEl = document.getElementById('finalScore');
  const msgEl = document.getElementById('resultMessage');

  const score = Math.round((correctCount / soalData.length) * 100);
  scoreEl.textContent = `${score} / 100`;

  let msg = '';
  if (score === 100) msg = '🌟 Sempurna! Kamu menguasai materi dengan sangat baik!';
  else if (score >= 80) msg = '🎯 Sangat bagus! Terus pertahankan prestasimu!';
  else if (score >= 60) msg = '👍 Cukup baik! Masih ada ruang untuk berkembang.';
  else if (score >= 40) msg = '📚 Perlu belajar lebih banyak. Jangan menyerah!';
  else msg = '💪 Terus semangat! Ulang lagi materinya dan coba lagi.';

  msgEl.textContent = `Kamu menjawab ${correctCount} soal benar dari ${soalData.length} soal. ${msg}`;
  summary.classList.add('show');
  summary.scrollIntoView({ behavior: 'smooth' });
}

function restartQuiz() {
  correctCount = 0;
  wrongCount = 0;
  answered = 0;
  document.getElementById('correctCount').textContent = 0;
  document.getElementById('wrongCount').textContent = 0;
  document.getElementById('resultSummary').classList.remove('show');
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
